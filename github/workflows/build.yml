name: Build & Push Trojan Image

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: I-checkout ang code
        uses: actions/checkout@v4

      - name: I-set up ang Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Mag-login sa Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_VIRGOZKI }}
          password: ${{ secrets.DOCKERHUB_TOKEN_RAPHRAGOS }}

      - name: Bumuo at I-push ang Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME_VIRGOZKI }}/trojan-server:latest
            ${{ secrets.DOCKERHUB_USERNAME_VIRGOZKI }}/trojan-server:v1.0
